{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me | Get In Touch</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

    <nav class="navbar">
        <div class="logo">Syed Talha Hussain </div>
        <ul class="nav-links">
            <li><a href="{% url 'home' %}">Home</a></li>
            <li><a href="{% url 'projects' %}">Projects</a></li>
            <li><a href="{% url 'contact' %}" class="active">Contact</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="glass-panel">
            <div class="hero-text" style="text-align: center; margin-bottom: 20px;">
                <h1>Get In <span>Touch</span></h1>
                <p>Have an exciting logistic platform idea or a custom project? Drop a message!</p>
            </div>

            <!-- Django Action Form built for your Views.py -->
            <form action="{% url 'contact' %}" method="POST" class="contact-form">
                {% csrf_token %}
                
                <div class="form-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" name="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="text" id="phone" name="phone" placeholder="+92 3xx xxxxxxx" required>
                </div>

                <div class="form-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Write your message here..." required></textarea>
                </div>

                <button type="submit" class="btn-gold" style="justify-content: center; margin-top: 10px;">
                    Send Message <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>

        </div>
    </div>

</body>
</html>
